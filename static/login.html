<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miyoubi Panel — Sign in</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--card:#141414;--card2:#1a1a1a;--border:#222;--border2:#2a2a2a;--text:#e8e8e8;--muted:#666;--muted2:#444;--accent:#fff;--red:#ef4444;--font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;display:flex;align-items:center;justify-content:center}
.box{width:360px;background:var(--card);border:1px solid var(--border2);border-radius:10px;padding:32px}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.logo-icon{width:34px;height:34px;background:var(--card2);border:1px solid var(--border2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-text{font-size:1.05rem;font-weight:600}
.logo-text span{color:var(--muted);font-weight:400}
h2{font-size:1.1rem;font-weight:600;margin-bottom:4px}
.sub{font-size:0.78rem;color:var(--muted);margin-bottom:24px}
.group{margin-bottom:14px}
label{font-size:0.72rem;font-weight:500;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;display:block;margin-bottom:6px}
input{width:100%;background:var(--card2);border:1px solid var(--border2);border-radius:6px;padding:9px 12px;font-family:var(--font);font-size:0.85rem;color:var(--text);outline:none;transition:border-color .15s}
input:focus{border-color:#444}
input::placeholder{color:var(--muted2)}
.btn{width:100%;margin-top:8px;background:var(--accent);color:#000;border:none;border-radius:6px;padding:10px;font-family:var(--font);font-size:0.85rem;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn:hover{opacity:.88}
.btn:disabled{opacity:.5;cursor:not-allowed}
.err{font-size:0.75rem;color:var(--red);margin-top:10px;display:none;text-align:center}
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div class="logo-icon">&#x26F0;</div>
    <div class="logo-text">Miyoubi<span> Panel</span></div>
  </div>
  <h2>Sign in</h2>
  <div class="sub">Enter your credentials to continue</div>
  <div class="group">
    <label>Username</label>
    <input id="u" type="text" placeholder="admin" autocomplete="username">
  </div>
  <div class="group">
    <label>Password</label>
    <input id="p" type="password" placeholder="&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;" autocomplete="current-password"
           onkeydown="if(event.key==='Enter')login()">
  </div>
  <button class="btn" id="btn" onclick="login()">Sign in</button>
  <div class="err" id="err">Invalid username or password</div>
</div>
<script>
// If already logged in (valid cookie + backend confirms it), go straight to app.
(async function() {
  try {
    var r = await fetch('/api/auth/me');
    if (r.ok) { window.location.replace('/'); }
  } catch(e) {}
})();

async function login() {
  var u = document.getElementById('u').value.trim();
  var p = document.getElementById('p').value;
  var err = document.getElementById('err');
  var btn = document.getElementById('btn');
  err.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Signing in...';

  try {
    var res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p })
    });
    var data = await res.json();
    if (res.ok && data.ok) {
      // Set cookie (7 days)
      var exp = new Date(Date.now() + 7 * 864e5).toUTCString();
      document.cookie = 'mcpanel_user=' + encodeURIComponent(u) + '; expires=' + exp + '; path=/; SameSite=Strict';
      window.location.replace('/');
    } else {
      err.textContent = data.message || 'Invalid username or password';
      err.style.display = 'block';
      document.getElementById('p').value = '';
      document.getElementById('p').focus();
    }
  } catch(e) {
    err.textContent = 'Could not reach the server';
    err.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = 'Sign in';
  }
}
</script>
</body>
</html>
