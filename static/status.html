<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Server Status</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #141210;
  --sb:      #1a1714;
  --card:    #1f1c19;
  --card2:   #252119;
  --card3:   #2a261f;
  --border:  #2e2922;
  --border2: #362f26;
  --text:    #e8e2d9;
  --muted:   #7a6f62;
  --muted2:  #4a4238;
  --accent:  #c8b89a;
  --green:   #6dbd8a;
  --red:     #d4635a;
  --amber:   #d4a45a;
  --blue:    #6aabcf;
  --font:    'Instrument Sans', sans-serif;
  --mono:    'Geist Mono', monospace;
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  min-height: 100%; background: var(--bg); color: var(--text);
  font-family: var(--font); font-size: 14px;
}
body {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh; padding: 20px;
}

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.wrap { width: 100%; max-width: 460px; display: flex; flex-direction: column; gap: 8px; }

.brand-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 0 2px; margin-bottom: 4px;
}
.brand-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted2); transition: background .3s; }
.brand-text { font-size: 0.62rem; font-weight: 600; color: var(--muted2); letter-spacing: .12em; text-transform: uppercase; }
.brand-right { margin-left: auto; font-size: 0.6rem; color: var(--muted2); font-family: var(--mono); }

.main-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }

.srv-hdr { padding: 18px 20px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 14px; }
.srv-icon {
  width: 42px; height: 42px; border-radius: 9px; flex-shrink: 0;
  background: var(--card2); border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center; font-size: 18px;
}
.srv-name { font-size: 1.05rem; font-weight: 600; letter-spacing: -.02em; line-height: 1.2; }
.srv-sub  { font-size: 0.65rem; color: var(--muted); margin-top: 3px; }
.status-pill {
  margin-left: auto; flex-shrink: 0;
  font-size: 0.58rem; font-weight: 600; padding: 3px 9px;
  border-radius: 5px; letter-spacing: .06em; margin-top: 3px;
}
.status-pill.online  { background: rgba(109,189,138,.1); color: var(--green); border: 1px solid rgba(109,189,138,.25); }
.status-pill.offline { background: rgba(212,99,90,.1);   color: var(--red);   border: 1px solid rgba(212,99,90,.25); }

.waveform-row { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 14px; }
.waveform { display: flex; align-items: flex-end; gap: 2.5px; height: 20px; }
.w-bar { width: 3px; border-radius: 1px; background: var(--border2); height: 3px; }
.waveform.running .w-bar { background: var(--green); animation: wave 1.1s ease-in-out infinite; }
.waveform.running .w-bar:nth-child(1){animation-delay:.00s}
.waveform.running .w-bar:nth-child(2){animation-delay:.12s}
.waveform.running .w-bar:nth-child(3){animation-delay:.24s}
.waveform.running .w-bar:nth-child(4){animation-delay:.36s}
.waveform.running .w-bar:nth-child(5){animation-delay:.48s}
.waveform.running .w-bar:nth-child(6){animation-delay:.60s}
@keyframes wave { 0%,100%{height:3px} 50%{height:17px} }
.uptime-text { font-size: 0.68rem; color: var(--muted); font-family: var(--mono); }

.metrics { display: grid; grid-template-columns: 1fr 1fr 1fr; border-bottom: 1px solid var(--border); }
.metric-cell { padding: 13px 16px; border-right: 1px solid var(--border); }
.metric-cell:last-child { border-right: none; }
.metric-lbl { font-size: 0.56rem; font-weight: 600; color: var(--muted2); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 5px; }
.metric-val { font-size: 0.95rem; font-weight: 600; font-family: var(--mono); line-height: 1; }
.metric-sub { font-size: 0.58rem; color: var(--muted); margin-top: 3px; }
.bar-track  { height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 6px; }
.bar-fill   { height: 100%; border-radius: 2px; background: var(--accent); transition: width .5s ease, background .3s; width: 0%; }
.bar-fill.warn   { background: var(--amber); }
.bar-fill.danger { background: var(--red); }

.players-section { padding: 14px 18px; }
.players-lbl {
  font-size: 0.56rem; font-weight: 600; color: var(--muted2);
  text-transform: uppercase; letter-spacing: .1em; margin-bottom: 10px;
  display: flex; align-items: center; justify-content: space-between;
}
.players-count { font-size: 0.62rem; color: var(--muted); font-family: var(--mono); text-transform: none; letter-spacing: 0; }
.players-grid { display: flex; flex-wrap: wrap; gap: 7px; }
.player-card {
  display: flex; align-items: center; gap: 8px;
  background: var(--card2); border: 1px solid var(--border);
  border-radius: 7px; padding: 7px 10px;
}
.player-av {
  width: 28px; height: 28px; border-radius: 4px;
  background: var(--card3); border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.6rem; color: var(--muted); font-family: var(--mono);
  flex-shrink: 0; overflow: hidden;
}
.player-av canvas { width: 28px; height: 28px; display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
.player-info { display: flex; flex-direction: column; gap: 2px; }
.player-name { font-size: 0.73rem; font-family: var(--mono); }
.player-type { font-size: 0.5rem; font-weight: 600; padding: 1px 4px; border-radius: 3px; letter-spacing: .04em; display: inline-block; }
.player-type.bedrock { background: rgba(106,171,207,.1); color: var(--blue);  border: 1px solid rgba(106,171,207,.2); }
.player-type.java    { background: rgba(109,189,138,.1); color: var(--green); border: 1px solid rgba(109,189,138,.2); }
.no-players { font-size: 0.72rem; color: var(--muted2); padding: 4px 0; }
.player-deaths { font-size: 0.5rem; font-weight: 600; padding: 1px 4px; border-radius: 3px; letter-spacing: .03em; display: inline-block; background: rgba(212,99,90,.1); color: var(--red, #d4635a); border: 1px solid rgba(212,99,90,.2); margin-top: 1px; }

.footer { display: flex; align-items: center; justify-content: space-between; padding: 0 2px; margin-top: 4px; }
.footer-text { font-size: 0.58rem; color: var(--muted2); }
.footer-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--muted2); transition: background .3s; }
.footer-dot.on { background: var(--green); box-shadow: 0 0 6px rgba(109,189,138,.4); }

@keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
.wrap { animation: fadeUp .28s ease both; }
</style>
<script>
(function() {
  var AP_THEMES = {
    warm:     {'--bg':'#141210','--sb':'#1a1714','--card':'#1f1c19','--card2':'#252119','--card3':'#2a261f','--border':'#2e2922','--border2':'#362f26','--text':'#e8e2d9','--muted':'#7a6f62','--muted2':'#4a4238','--accent':'#c8b89a','--green':'#6dbd8a','--red':'#d4635a','--amber':'#d4a45a','--blue':'#6aabcf'},
    cool:     {'--bg':'#0f1218','--sb':'#141921','--card':'#1a2130','--card2':'#1f2838','--card3':'#243040','--border':'#263040','--border2':'#2e3a4e','--text':'#d8e4f0','--muted':'#5a7a96','--muted2':'#2e4460','--accent':'#7ab3d4','--green':'#5ec97a','--red':'#d46a5a','--amber':'#d4a45a','--blue':'#7ab3d4'},
    forest:   {'--bg':'#0d1410','--sb':'#111a13','--card':'#162018','--card2':'#1a2820','--card3':'#1f3025','--border':'#233828','--border2':'#2a4230','--text':'#d8edd8','--muted':'#5a7a62','--muted2':'#2e4a38','--accent':'#7abd8a','--green':'#a8d47a','--red':'#d4635a','--amber':'#d4c45a','--blue':'#6aabcf'},
    midnight: {'--bg':'#08080f','--sb':'#0d0d18','--card':'#121220','--card2':'#181828','--card3':'#1e1e32','--border':'#222235','--border2':'#2a2a42','--text':'#e0dff8','--muted':'#6a6a92','--muted2':'#3a3a58','--accent':'#9a8adf','--green':'#6dbd8a','--red':'#d4635a','--amber':'#d4a45a','--blue':'#7a9adf'},
    mocha:    {'--bg':'#1a1008','--sb':'#221508','--card':'#2a1c0e','--card2':'#322216','--card3':'#3a2a1e','--border':'#3e2e1e','--border2':'#4a3828','--text':'#f0e0c8','--muted':'#8a6a4a','--muted2':'#5a4030','--accent':'#d4a45a','--green':'#7abd8a','--red':'#d4635a','--amber':'#d4a45a','--blue':'#6aabcf'}
  };
  try {
    var t = AP_THEMES[localStorage.getItem('mcpanel_theme') || 'warm'];
    if (t) Object.keys(t).forEach(function(k) { document.documentElement.style.setProperty(k, t[k]); });
  } catch(e) {}
})();
</script>
</head>
<body>
<div class="wrap">

  <div class="brand-bar">
    <div class="brand-dot" id="brand-dot"></div>
    <div class="brand-text">Miyoubi Panel — Server Status</div>
    <div class="brand-right" id="refresh-label">Loading...</div>
  </div>

  <div class="main-card">
    <div class="srv-hdr">
      <div class="srv-icon">⛰</div>
      <div style="flex:1;min-width:0">
        <div class="srv-name" id="srv-name">Loading...</div>
        <div class="srv-sub">Docker Minecraft Server</div>
      </div>
      <div class="status-pill offline" id="status-pill">CHECKING</div>
    </div>

    <div class="waveform-row">
      <div class="waveform" id="waveform">
        <div class="w-bar"></div><div class="w-bar"></div><div class="w-bar"></div>
        <div class="w-bar"></div><div class="w-bar"></div><div class="w-bar"></div>
      </div>
      <div class="uptime-text" id="uptime-text">—</div>
    </div>

    <div class="metrics">
      <div class="metric-cell">
        <div class="metric-lbl">Players</div>
        <div class="metric-val" id="m-players">—</div>
        <div class="metric-sub" id="m-players-sub">online</div>
      </div>
      <div class="metric-cell">
        <div class="metric-lbl">Memory</div>
        <div class="metric-val" id="m-mem">—</div>
        <div class="metric-sub" id="m-mem-sub">—</div>
        <div class="bar-track"><div class="bar-fill" id="bar-mem"></div></div>
      </div>
      <div class="metric-cell">
        <div class="metric-lbl">CPU</div>
        <div class="metric-val" id="m-cpu">—</div>
        <div class="metric-sub">usage</div>
        <div class="bar-track"><div class="bar-fill" id="bar-cpu"></div></div>
      </div>
    </div>

    <div class="players-section">
      <div class="players-lbl">
        Online Players
        <span class="players-count" id="players-count"></span>
      </div>
      <div class="players-grid" id="player-list">
        <span class="no-players">No players online</span>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-text">Auto-refreshes every 10 seconds</div>
    <div class="footer-dot" id="footer-dot"></div>
  </div>

</div>

<script>
var pathParts = window.location.pathname.split('/').filter(Boolean);
var serverId  = pathParts[1] || '';
var serverName = '';
var bedrockHeadCache = {};

async function refresh() {
  if (!serverId) { document.getElementById('srv-name').textContent = 'Server not found'; return; }

  var footerDot = document.getElementById('footer-dot');
  footerDot.style.background = 'var(--accent)';
  setTimeout(function() { footerDot.className = 'footer-dot' + (footerDot.dataset.online === '1' ? ' on' : ''); }, 400);

  try {
    var sr = await fetch('/api/public/' + serverId + '/status');
    if (!sr.ok) { setOffline('Not found'); return; }
    var s = await sr.json();

    if (!serverName && s.name) {
      serverName = s.name;
      document.getElementById('srv-name').textContent = s.name;
      document.title = s.name + ' — Server Status';
    }

    var online = s.running;
    footerDot.dataset.online = online ? '1' : '0';
    footerDot.className = 'footer-dot' + (online ? ' on' : '');
    document.getElementById('brand-dot').style.background = online ? 'var(--green)' : 'var(--red)';

    document.getElementById('status-pill').textContent = online ? 'ONLINE' : 'OFFLINE';
    document.getElementById('status-pill').className   = 'status-pill ' + (online ? 'online' : 'offline');
    document.getElementById('waveform').className      = 'waveform' + (online ? ' running' : '');
    document.getElementById('uptime-text').textContent = s.uptime ? 'Up ' + s.uptime : (online ? 'Running' : 'Offline');

    var now = new Date();
    document.getElementById('refresh-label').textContent =
      'Updated ' + now.getHours().toString().padStart(2,'0') + ':' +
      now.getMinutes().toString().padStart(2,'0') + ':' +
      now.getSeconds().toString().padStart(2,'0');

    try {
      var ar = await fetch('/api/public/' + serverId + '/stats');
      if (ar.ok) {
        var a = await ar.json();
        var mu = a.mem_usage_mb||0, ml = a.mem_limit_mb||1, mp = ml>0?mu/ml*100:0, cpu = a.cpu_percent||0;
        document.getElementById('m-mem').textContent     = online ? mu.toFixed(0)+' MB' : '—';
        document.getElementById('m-mem-sub').textContent = online && ml>0 ? 'of '+ml.toFixed(0)+' MB' : '—';
        document.getElementById('m-cpu').textContent     = online ? cpu.toFixed(1)+'%' : '—';
        setBar('bar-mem', online ? mp  : 0);
        setBar('bar-cpu', online ? cpu : 0);
      }
    } catch(e) {}

    try {
      var pr = await fetch('/api/public/' + serverId + '/players');
      if (pr.ok) {
        var p = await pr.json();
        var count = p.count||0, max = p.max||20;
        document.getElementById('m-players').textContent     = count+' / '+max;
        document.getElementById('m-players-sub').textContent = 'of '+max+' max';
        document.getElementById('players-count').textContent = count+' online';
        var listEl = document.getElementById('player-list');
        if (p.online && p.online.length > 0) {
          var newNames = p.online.join(',');
          if (listEl.dataset.names !== newNames) {
            listEl.dataset.names = newNames;
            listEl.innerHTML = '';
            // Fetch death counts in parallel then render cards
            var deathMap = {};
            try {
              var dr = await fetch('/api/public/' + serverId + '/deaths');
              if (dr.ok) deathMap = await dr.json();
            } catch(e) {}
            p.online.forEach(function(name) {
              var isBedrock = name.charAt(0) === '.';
              var displayName = isBedrock ? name.slice(1) : name;
              // Death map keys are canonical (.Steve for Bedrock, Steve for Java)
              var deaths = deathMap[name] !== undefined ? deathMap[name]
                         : deathMap[displayName] !== undefined ? deathMap[displayName]
                         : null;
              var card = document.createElement('div'); card.className = 'player-card';
              var av = document.createElement('div'); av.className = 'player-av';
              av.textContent = displayName.slice(0,2).toUpperCase();
              var info = document.createElement('div'); info.className = 'player-info';
              var deathBadge = (deaths !== null && deaths > 0)
                ? '<span class="player-deaths">☠ ' + deaths + '</span>' : '';
              info.innerHTML =
                '<span class="player-name">'+escHtml(displayName)+'</span>'+
                '<div style="display:flex;gap:3px;align-items:center">'+
                  '<span class="player-type '+(isBedrock?'bedrock':'java')+'">'+(isBedrock?'Bedrock':'Java')+'</span>'+
                  deathBadge+
                '</div>';
              card.appendChild(av); card.appendChild(info);
              listEl.appendChild(card);
              if (isBedrock) loadBedrockHead(displayName, av);
              else loadJavaHead(displayName, av);
            });
          }
        } else {
          listEl.innerHTML = '<span class="no-players">No players online</span>';
          listEl.dataset.names = '';
        }
      }
    } catch(e) {}

  } catch(e) { setOffline('Error'); }
}

function setOffline(msg) {
  document.getElementById('status-pill').textContent = msg||'OFFLINE';
  document.getElementById('status-pill').className   = 'status-pill offline';
  document.getElementById('waveform').className      = 'waveform';
  document.getElementById('uptime-text').textContent = '—';
  document.getElementById('m-players').textContent   = '—';
  document.getElementById('m-mem').textContent       = '—';
  document.getElementById('m-cpu').textContent       = '—';
  setBar('bar-mem', 0); setBar('bar-cpu', 0);
}

function setBar(id, pct) {
  var el = document.getElementById(id); if (!el) return;
  el.style.width = Math.min(100, pct||0).toFixed(1)+'%';
  el.className = 'bar-fill'+(pct>85?' danger':pct>65?' warn':'');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function loadJavaHead(username, avEl) {
  var img = new Image(); img.crossOrigin = 'anonymous';
  img.onload = function() {
    avEl.textContent = ''; avEl.style.padding = '0';
    var c = document.createElement('canvas'); c.width = 28; c.height = 28;
    var ctx = c.getContext('2d'); ctx.imageSmoothingEnabled = false;
    ctx.drawImage(img, 0, 0, 28, 28); avEl.appendChild(c);
  };
  img.src = 'https://minotar.net/helm/'+encodeURIComponent(username)+'/28.png';
}

async function loadBedrockHead(xboxName, avEl) {
  try {
    if (bedrockHeadCache[xboxName]) { renderSkinHead(bedrockHeadCache[xboxName], avEl, 28); return; }
    var xr = await fetch('https://api.geysermc.org/v2/xbox/xuid/'+encodeURIComponent(xboxName));
    if (!xr.ok) throw new Error();
    var xd = await xr.json(); if (!xd.xuid) throw new Error();
    var sr2 = await fetch('https://api.geysermc.org/v2/skin/'+xd.xuid);
    if (!sr2.ok) throw new Error();
    var sd = await sr2.json(); if (!sd.texture_id) throw new Error();
    var url = 'https://textures.minecraft.net/texture/'+sd.texture_id;
    bedrockHeadCache[xboxName] = url;
    renderSkinHead(url, avEl, 28);
  } catch(e) {}
}

function renderSkinHead(url, avEl, size) {
  var img = new Image(); img.crossOrigin = 'anonymous';
  img.onload = function() {
    try {
      var sw = img.naturalWidth, sc = sw/64;
      var c = document.createElement('canvas'); c.width = size; c.height = size;
      var ctx = c.getContext('2d'); ctx.imageSmoothingEnabled = false;
      ctx.drawImage(img, 8*sc, 8*sc, 8*sc, 8*sc, 0, 0, size, size);
      if (img.naturalHeight >= 32*sc) {
        var t = document.createElement('canvas'); t.width = 8*sc; t.height = 8*sc;
        var tctx = t.getContext('2d');
        tctx.drawImage(img, 40*sc, 8*sc, 8*sc, 8*sc, 0, 0, 8*sc, 8*sc);
        var px = tctx.getImageData(0, 0, 8*sc, 8*sc).data;
        var hasHat = false;
        for (var i = 3; i < px.length; i += 4) { if (px[i] > 10) { hasHat = true; break; } }
        if (hasHat) ctx.drawImage(img, 40*sc, 8*sc, 8*sc, 8*sc, 0, 0, size, size);
      }
      avEl.textContent = ''; avEl.style.padding = '0'; avEl.appendChild(c);
    } catch(e) {}
  };
  img.src = url;
}

refresh();
setInterval(refresh, 10000);
</script>
</body>
</html>
