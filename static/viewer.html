<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miyoubi Panel</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #080808;
  --surface: #111;
  --card:    #141414;
  --card2:   #1a1a1a;
  --border:  #1e1e1e;
  --border2: #272727;
  --text:    #ededed;
  --muted:   #555;
  --muted2:  #333;
  --green:   #22c55e;
  --red:     #ef4444;
  --amber:   #f59e0b;
  --blue:    #3b82f6;
  --font:    'Geist', 'Inter', sans-serif;
  --mono:    'Geist Mono', 'JetBrains Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; }

/* ── Layout ───────────────────────────────────────────────────────────── */
.app { display: flex; height: 100vh; overflow: hidden; }

/* ── Sidebar ──────────────────────────────────────────────────────────── */
.sidebar {
  width: 200px; min-width: 200px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.sb-logo {
  padding: 14px 16px;
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--border);
}
.sb-logo-icon {
  width: 28px; height: 28px;
  background: var(--card2); border: 1px solid var(--border2);
  border-radius: 7px; display: flex; align-items: center; justify-content: center;
  font-size: 13px; flex-shrink: 0; overflow: hidden;
}
.sb-logo-text { font-size: 0.88rem; font-weight: 600; letter-spacing: -.01em; }
.sb-logo-text span { color: var(--muted); font-weight: 400; }
.sb-section {
  padding: 14px 16px 5px;
  font-size: 0.6rem; font-weight: 600; color: var(--muted2);
  letter-spacing: .12em; text-transform: uppercase;
}
.sb-servers { flex: 1; overflow-y: auto; padding-bottom: 4px; }
.sb-servers::-webkit-scrollbar { width: 0; }
.srv-item {
  display: flex; align-items: center; gap: 9px;
  padding: 7px 12px; margin: 1px 8px; border-radius: 6px;
  cursor: pointer; transition: background .12s;
}
.srv-item:hover { background: rgba(255,255,255,.05); }
.srv-item.active { background: rgba(255,255,255,.07); }
.srv-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--muted2); flex-shrink: 0; transition: background .3s;
}
.srv-dot.on { background: var(--green); }
.srv-name {
  font-size: 0.79rem; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
  color: var(--muted); transition: color .12s;
}
.srv-item.active .srv-name, .srv-item:hover .srv-name { color: var(--text); }
.sb-bottom {
  border-top: 1px solid var(--border); flex-shrink: 0;
}
.sb-user {
  padding: 10px 14px; display: flex; align-items: center; gap: 9px;
  cursor: pointer; transition: background .12s;
}
.sb-user:hover { background: rgba(255,255,255,.04); }
.sb-avatar {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--card2); border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.65rem; color: var(--muted); font-weight: 600; flex-shrink: 0;
}
.sb-uname { font-size: 0.78rem; font-weight: 500; }
.sb-role { font-size: 0.63rem; color: var(--muted); }
.sb-signout {
  margin-left: auto; font-size: 0.65rem; color: var(--muted2);
  background: none; border: none; cursor: pointer; padding: 2px;
  transition: color .12s;
}
.sb-signout:hover { color: var(--red); }
.sb-version { font-size: 0.58rem; color: var(--muted2); padding: 5px 16px 10px; }

/* ── Main area ────────────────────────────────────────────────────────── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.srv-header {
  padding: 13px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
  background: var(--surface); flex-shrink: 0;
}
.srv-icon {
  width: 40px; height: 40px; border-radius: 8px;
  background: var(--card2); border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; flex-shrink: 0; overflow: hidden;
}
.srv-title { font-size: 1rem; font-weight: 600; letter-spacing: -.01em; }
.srv-subtitle { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }

.ctrl-btns { margin-left: auto; display: flex; gap: 7px; }
.ctrl-btn {
  font-size: 0.74rem; font-weight: 500;
  padding: 6px 13px; border-radius: 6px;
  border: 1px solid var(--border2); cursor: pointer;
  background: var(--card2); color: var(--text);
  display: flex; align-items: center; gap: 5px;
  transition: background .12s, border-color .12s, color .12s;
}
.ctrl-btn:disabled { opacity: .3; cursor: not-allowed; }
.ctrl-btn:hover:not(:disabled) { background: var(--card); border-color: #444; }
.ctrl-btn-stop:hover:not(:disabled)    { border-color: var(--red);   color: var(--red); }
.ctrl-btn-restart:hover:not(:disabled) { border-color: var(--amber); color: var(--amber); }
.ctrl-btn-start:hover:not(:disabled)   { border-color: var(--green); color: var(--green); }

/* ── Content ──────────────────────────────────────────────────────────── */
.content { flex: 1; overflow-y: auto; padding: 18px 20px; display: flex; flex-direction: column; gap: 14px; }
.content::-webkit-scrollbar { width: 4px; }
.content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ── Cards row ────────────────────────────────────────────────────────── */
.cards-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 9px; padding: 14px;
}
.card-label {
  font-size: 0.62rem; font-weight: 600; color: var(--muted);
  letter-spacing: .08em; text-transform: uppercase; margin-bottom: 10px;
  display: flex; align-items: center; justify-content: space-between;
}
.card-label-icon {
  width: 24px; height: 24px; border-radius: 5px;
  background: var(--card2); border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center; font-size: 11px;
}

/* Status card */
.waveform { display: flex; align-items: flex-end; gap: 3px; height: 30px; margin-bottom: 7px; }
.w-bar { width: 4px; border-radius: 2px; background: var(--border2); height: 6px; transition: background .4s; }
.waveform.running .w-bar { background: var(--green); animation: wave 1.1s ease-in-out infinite; }
.waveform.running .w-bar:nth-child(1){animation-delay:.00s}
.waveform.running .w-bar:nth-child(2){animation-delay:.12s}
.waveform.running .w-bar:nth-child(3){animation-delay:.24s}
.waveform.running .w-bar:nth-child(4){animation-delay:.36s}
.waveform.running .w-bar:nth-child(5){animation-delay:.48s}
.waveform.running .w-bar:nth-child(6){animation-delay:.60s}
@keyframes wave { 0%,100%{height:5px} 50%{height:24px} }
.status-text { font-size: 1rem; font-weight: 600; color: var(--muted); }
.status-text.running { color: var(--green); }
.status-text.stopped { color: var(--red); }
.status-sub { font-size: 0.65rem; color: var(--muted); margin-top: 2px; }

/* Connection card */
.conn-box {
  background: var(--card2); border: 1px solid var(--border2);
  border-radius: 5px; padding: 8px 10px;
  font-family: var(--mono); font-size: 0.72rem;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; transition: border-color .15s; margin-bottom: 4px;
}
.conn-box:hover { border-color: #383838; }
.copy-lbl { font-size: 0.58rem; color: var(--muted2); font-family: var(--font); }
.conn-hint { font-size: 0.62rem; color: var(--muted2); }

/* Performance card */
.perf-item { margin-bottom: 9px; }
.perf-item:last-child { margin-bottom: 0; }
.perf-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
.perf-lbl { font-size: 0.61rem; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
.perf-val { font-size: 0.61rem; font-weight: 600; font-family: var(--mono); }
.perf-track { height: 3px; background: var(--border2); border-radius: 2px; overflow: hidden; }
.perf-fill { height: 100%; border-radius: 2px; background: #444; transition: width .6s ease, background .4s; width: 0; }
.perf-fill.warn { background: var(--amber); }
.perf-fill.danger { background: var(--red); }

/* ── Players panel ────────────────────────────────────────────────────── */
.players-panel {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 9px; padding: 14px;
}
.players-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.players-title { font-size: 0.62rem; font-weight: 600; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; }
.player-count { font-size: 0.65rem; color: var(--muted); }
.players-empty { font-size: 0.75rem; color: var(--muted2); padding: 10px 0; }
.players-grid { display: flex; flex-wrap: wrap; gap: 7px; }
.player-chip {
  display: flex; align-items: center; gap: 7px;
  background: var(--card2); border: 1px solid var(--border2);
  border-radius: 6px; padding: 6px 10px;
}
.player-avatar {
  width: 24px; height: 24px; border-radius: 4px;
  background: var(--card); border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.62rem; color: var(--muted); font-family: var(--mono);
  overflow: hidden; flex-shrink: 0;
}
.player-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 3px; }
.player-name { font-size: 0.76rem; font-family: var(--mono); }
.player-online { font-size: 0.6rem; color: var(--green); margin-top: 1px; }

/* ── Toast ────────────────────────────────────────────────────────────── */
#toast {
  position: fixed; bottom: 18px; right: 18px; z-index: 9999;
  background: var(--card2); border: 1px solid var(--border2);
  border-radius: 6px; padding: 8px 14px;
  font-size: 0.75rem; color: var(--text);
  transform: translateY(50px); opacity: 0;
  transition: all .2s ease; max-width: 280px; pointer-events: none;
}
#toast.show { transform: translateY(0); opacity: 1; }
#toast.err  { border-color: var(--red);   color: var(--red); }
#toast.ok   { border-color: var(--green); color: var(--green); }

/* ── Empty state ──────────────────────────────────────────────────────── */
.empty-state {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px;
  color: var(--muted2); text-align: center; padding: 40px;
}
.empty-icon { font-size: 32px; margin-bottom: 4px; }
.empty-title { font-size: 0.9rem; font-weight: 500; color: var(--muted); }
.empty-sub { font-size: 0.75rem; }
</style>
</head>
<body>
<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-icon" id="sb-logo-icon">&#x26F0;</div>
      <div class="sb-logo-text">Miyoubi<span> Panel</span></div>
    </div>
    <div class="sb-section">Servers</div>
    <div class="sb-servers" id="srv-list"></div>
    <div class="sb-bottom">
      <div class="sb-user">
        <div class="sb-avatar" id="sb-avatar">?</div>
        <div style="flex:1;min-width:0">
          <div class="sb-uname" id="sb-uname">—</div>
          <div class="sb-role">Viewer</div>
        </div>
        <button class="sb-signout" onclick="doLogout()" title="Sign out">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" d="M10 3.75a.75.75 0 0 0-1.5 0v4.5a.75.75 0 0 0 1.5 0v-4.5zm-8.5 4A4.25 4.25 0 0 1 5.75 3.5a.75.75 0 0 0 0-1.5A5.75 5.75 0 1 0 11.5 8a.75.75 0 0 0-1.5 0A4.25 4.25 0 1 1 1.5 7.75z"/></svg>
        </button>
      </div>
      <div class="sb-version">v0.0.1 — Viewer mode</div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main" id="main">

    <!-- Header (hidden until a server is selected) -->
    <div class="srv-header" id="srv-header" style="display:none">
      <div class="srv-icon" id="srv-icon">&#x26F0;</div>
      <div>
        <div class="srv-title" id="srv-name">—</div>
        <div class="srv-subtitle" id="srv-port">—</div>
      </div>
      <div class="ctrl-btns">
        <button class="ctrl-btn ctrl-btn-start"   id="btn-start"   onclick="action('start')"   disabled>
          <svg width="9" height="9" viewBox="0 0 9 9" fill="currentColor"><polygon points="1,0.5 8.5,4.5 1,8.5"/></svg>Start
        </button>
        <button class="ctrl-btn ctrl-btn-stop"    id="btn-stop"    onclick="action('stop')"    disabled>
          <svg width="9" height="9" viewBox="0 0 9 9" fill="currentColor"><rect x="1" y="1" width="7" height="7"/></svg>Stop
        </button>
        <button class="ctrl-btn ctrl-btn-restart" id="btn-restart" onclick="action('restart')" disabled>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>Restart
        </button>
      </div>
    </div>

    <!-- Empty state -->
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">&#x26F0;</div>
      <div class="empty-title">Select a server</div>
      <div class="empty-sub">Choose a server from the sidebar to view its status</div>
    </div>

    <!-- Server content -->
    <div class="content" id="content" style="display:none">

      <div class="cards-row">
        <!-- Status -->
        <div class="card">
          <div class="card-label">
            Server Status
            <div class="card-label-icon">&#x2665;</div>
          </div>
          <div class="waveform" id="waveform">
            <div class="w-bar"></div><div class="w-bar"></div><div class="w-bar"></div>
            <div class="w-bar"></div><div class="w-bar"></div><div class="w-bar"></div>
          </div>
          <div class="status-text" id="status-text">—</div>
          <div class="status-sub"  id="status-sub">Connecting...</div>
        </div>

        <!-- Connection -->
        <div class="card">
          <div class="card-label">
            Connection
            <div class="card-label-icon">&#x1F310;</div>
          </div>
          <div class="conn-box" onclick="copyAddr()" id="conn-box">
            <span id="conn-addr" style="font-family:var(--mono)">—</span>
            <span class="copy-lbl">Copy</span>
          </div>
          <div class="conn-hint" id="uptime-display">&nbsp;</div>
        </div>

        <!-- Performance -->
        <div class="card">
          <div class="card-label">
            Performance
            <div class="card-label-icon">&#x1F4CA;</div>
          </div>
          <div class="perf-item">
            <div class="perf-header">
              <span class="perf-lbl">Memory</span>
              <span class="perf-val" id="mem-val">— MB</span>
            </div>
            <div class="perf-track"><div class="perf-fill" id="mem-bar"></div></div>
          </div>
          <div class="perf-item">
            <div class="perf-header">
              <span class="perf-lbl">CPU</span>
              <span class="perf-val" id="cpu-val">—%</span>
            </div>
            <div class="perf-track"><div class="perf-fill" id="cpu-bar"></div></div>
          </div>
          <div style="font-size:0.62rem;color:var(--muted2);margin-top:8px" id="players-mini">— / — players</div>
        </div>
      </div>

      <!-- Players -->
      <div class="players-panel">
        <div class="players-header">
          <span class="players-title">Online Players</span>
          <span class="player-count" id="player-count">0 / 20</span>
        </div>
        <div id="players-list" class="players-empty">No players online</div>
      </div>

    </div><!-- /content -->
  </div><!-- /main -->
</div>

<div id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
var currentUser = null;
var servers = [];
var currentId = null;
var pollTimer = null;
var playerPollTimer = null;

// ── Init ───────────────────────────────────────────────────────────────────
window.addEventListener('load', async function() {
  // Apply panel icon from localStorage
  try {
    var pref = JSON.parse(localStorage.getItem('mcpanel_icon') || 'null');
    var url = pref && pref.mode === 'mc' && pref.value
      ? 'https://crafatar.com/avatars/' + encodeURIComponent(pref.value) + '?size=64&overlay&default=MHF_Steve'
      : pref && pref.mode === 'url' && pref.value ? pref.value : null;
    if (url) {
      ['sb-logo-icon','srv-icon'].forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.innerHTML = '<img src="' + url + '" style="width:100%;height:100%;object-fit:cover;border-radius:6px" onerror="this.parentNode.textContent=String.fromCodePoint(9968)">';
      });
    }
  } catch(e) {}

  // Auth check
  try {
    var r = await fetch('/api/auth/me');
    if (!r.ok) { window.location.replace('/login'); return; }
    var data = await r.json();
    if (!data.ok) { window.location.replace('/login'); return; }
    currentUser = data.username;
    document.getElementById('sb-avatar').textContent = currentUser[0].toUpperCase();
    document.getElementById('sb-uname').textContent = currentUser;
    // Admins should use the full panel
    if (data.role === 'admin') { window.location.replace('/'); return; }
  } catch(e) { window.location.replace('/login'); return; }

  loadServers();
});

// ── Logout ─────────────────────────────────────────────────────────────────
function doLogout() {
  document.cookie = 'mcpanel_user=; max-age=0; path=/';
  window.location.replace('/login');
}

// ── Servers ────────────────────────────────────────────────────────────────
async function loadServers() {
  try {
    var r = await fetch('/api/servers');
    servers = await r.json();
  } catch(e) { servers = []; }
  renderSidebar();
  if (servers.length > 0) selectServer(servers[0].id);
}

function renderSidebar() {
  var el = document.getElementById('srv-list');
  if (!servers.length) {
    el.innerHTML = '<div style="padding:10px 16px;font-size:0.75rem;color:var(--muted2)">No servers available</div>';
    return;
  }
  el.innerHTML = servers.map(function(s) {
    return '<div class="srv-item' + (s.id === currentId ? ' active' : '') + '" id="si-' + s.id + '" onclick="selectServer(\'' + s.id + '\')">' +
      '<div class="srv-dot" id="dot-' + s.id + '"></div>' +
      '<div class="srv-name">' + esc(s.name) + '</div>' +
    '</div>';
  }).join('');
}

function selectServer(id) {
  currentId = id;
  clearTimeout(pollTimer);
  clearTimeout(playerPollTimer);

  document.querySelectorAll('.srv-item').forEach(function(el) { el.classList.remove('active'); });
  var item = document.getElementById('si-' + id);
  if (item) item.classList.add('active');

  var srv = servers.find(function(s) { return s.id === id; });
  if (srv) {
    document.getElementById('srv-name').textContent = srv.name;
    document.getElementById('srv-port').textContent = 'Port ' + srv.port;
    document.getElementById('conn-addr').textContent = 'localhost:' + srv.port;
  }

  document.getElementById('srv-header').style.display = '';
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('content').style.display = '';

  // Reset UI
  setStatus(null);
  document.getElementById('players-list').className = 'players-empty';
  document.getElementById('players-list').textContent = 'Loading...';

  fetchStatus();
  fetchPlayers();
}

// ── Status polling ─────────────────────────────────────────────────────────
async function fetchStatus() {
  if (!currentId) return;
  try {
    var r = await fetch('/api/servers/' + currentId + '/status');
    if (!r.ok) throw new Error();
    var s = await r.json();
    setStatus(s);
    updateButtons(s.running);
    var dot = document.getElementById('dot-' + currentId);
    if (dot) { dot.classList.toggle('on', s.running); }
    if (s.running) fetchStats();
  } catch(e) {
    setStatus(null);
    updateButtons(false);
  } finally {
    pollTimer = setTimeout(fetchStatus, 5000);
  }
}

function setStatus(s) {
  var wv = document.getElementById('waveform');
  var st = document.getElementById('status-text');
  var ss = document.getElementById('status-sub');
  if (!s) {
    wv.className = 'waveform'; st.className = 'status-text';
    st.textContent = 'OFFLINE'; ss.textContent = 'Could not reach server';
    return;
  }
  var running = s.running;
  wv.className = 'waveform' + (running ? ' running' : '');
  st.className  = 'status-text ' + (running ? 'running' : 'stopped');
  st.textContent = s.status ? s.status.toUpperCase() : (running ? 'RUNNING' : 'STOPPED');
  ss.textContent = running && s.uptime ? 'Up ' + s.uptime : (running ? 'Running' : 'Server stopped');
  document.getElementById('uptime-display').textContent = running && s.uptime ? 'Up ' + s.uptime : '\u00a0';
}

async function fetchStats() {
  if (!currentId) return;
  try {
    var r = await fetch('/api/servers/' + currentId + '/stats');
    if (!r.ok) return;
    var s = await r.json();
    var memPct = s.mem_limit_mb > 0 ? (s.mem_usage_mb / s.mem_limit_mb * 100) : 0;
    var cpuPct = Math.min(s.cpu_percent, 100);
    document.getElementById('mem-val').textContent = Math.round(s.mem_usage_mb) + ' / ' + Math.round(s.mem_limit_mb) + ' MB';
    document.getElementById('cpu-val').textContent = cpuPct.toFixed(1) + '%';
    var mb = document.getElementById('mem-bar');
    mb.style.width = memPct.toFixed(1) + '%';
    mb.className = 'perf-fill' + (memPct > 90 ? ' danger' : memPct > 70 ? ' warn' : '');
    var cb = document.getElementById('cpu-bar');
    cb.style.width = cpuPct.toFixed(1) + '%';
    cb.className = 'perf-fill' + (cpuPct > 90 ? ' danger' : cpuPct > 70 ? ' warn' : '');
  } catch(e) {}
}

// ── Players ────────────────────────────────────────────────────────────────
async function fetchPlayers() {
  if (!currentId) return;
  try {
    var r = await fetch('/api/servers/' + currentId + '/players');
    if (!r.ok) throw new Error();
    var data = await r.json();
    renderPlayers(data);
  } catch(e) {
    document.getElementById('players-list').className = 'players-empty';
    document.getElementById('players-list').textContent = 'Could not fetch players';
  } finally {
    playerPollTimer = setTimeout(fetchPlayers, 15000);
  }
}

function renderPlayers(data) {
  var el = document.getElementById('players-list');
  var count = data.count || (data.online ? data.online.length : 0);
  var max   = data.max || 20;
  document.getElementById('player-count').textContent = count + ' / ' + max;
  document.getElementById('players-mini').textContent = count + ' / ' + max + ' players';

  if (!data.online || !data.online.length) {
    el.className = 'players-empty';
    el.textContent = 'No players online';
    return;
  }
  el.className = 'players-grid';
  el.innerHTML = data.online.map(function(name) {
    var avatarUrl = 'https://crafatar.com/avatars/' + encodeURIComponent(name) + '?size=32&overlay&default=MHF_Steve';
    return '<div class="player-chip">' +
      '<div class="player-avatar"><img src="' + avatarUrl + '" alt="" onerror="this.parentNode.textContent=name[0]"></div>' +
      '<div><div class="player-name">' + esc(name) + '</div><div class="player-online">Online</div></div>' +
    '</div>';
  }).join('');
}

// ── Controls ───────────────────────────────────────────────────────────────
function updateButtons(running) {
  document.getElementById('btn-start').disabled   =  running;
  document.getElementById('btn-stop').disabled    = !running;
  document.getElementById('btn-restart').disabled = !running;
}

async function action(act) {
  if (!currentId) return;
  var btn = document.getElementById('btn-' + act);
  if (btn) btn.disabled = true;
  try {
    var r = await fetch('/api/servers/' + currentId + '/' + act, { method: 'POST' });
    var d = await r.json();
    toast(d.message || act + ' sent', r.ok ? 'ok' : 'err');
    setTimeout(fetchStatus, 1200);
  } catch(e) {
    toast('Failed', 'err');
  }
}

// ── Copy address ───────────────────────────────────────────────────────────
function copyAddr() {
  var addr = document.getElementById('conn-addr').textContent;
  navigator.clipboard.writeText(addr).then(function() { toast('Copied!', 'ok'); });
}

// ── Toast ──────────────────────────────────────────────────────────────────
var toastTimer;
function toast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.className = ''; }, 2800);
}

// ── Helpers ────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
