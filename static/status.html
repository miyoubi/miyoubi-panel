<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Server Status</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--card:#141414;--card2:#1a1a1a;--border:#222;--border2:#2a2a2a;--text:#e8e8e8;--muted:#666;--muted2:#444;--green:#22c55e;--red:#ef4444;--amber:#f59e0b;--font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;min-height:100vh}
.card{background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:28px 32px;width:100%;max-width:480px}
.brand{font-size:0.7rem;font-weight:500;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:20px}
.srv-name{font-size:1.4rem;font-weight:600;letter-spacing:-.02em;margin-bottom:4px}
.srv-type{font-size:0.78rem;color:var(--muted);margin-bottom:24px}
.status-row{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.dot{width:10px;height:10px;border-radius:50%;background:var(--muted2);flex-shrink:0;transition:background .3s}
.dot.online{background:var(--green);box-shadow:0 0 8px rgba(34,197,94,.4)}
.dot.offline{background:var(--red)}
.status-text{font-size:1rem;font-weight:600}
.status-text.online{color:var(--green)}
.status-text.offline{color:var(--red)}
.uptime{font-size:0.72rem;color:var(--muted);margin-left:auto}
.divider{height:1px;background:var(--border);margin-bottom:20px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.stat-box{background:var(--card2);border:1px solid var(--border2);border-radius:8px;padding:12px 14px}
.stat-label{font-size:0.62rem;font-weight:500;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.stat-val{font-family:var(--mono);font-size:0.95rem;font-weight:500}
.player-box{background:var(--card2);border:1px solid var(--border2);border-radius:8px;padding:12px 14px}
.player-label{font-size:0.62rem;font-weight:500;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.player-list{display:flex;flex-wrap:wrap;gap:6px}
.player-chip{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:3px 8px;font-size:0.72rem;font-family:var(--mono)}
.player-none{font-size:0.72rem;color:var(--muted2)}
.footer{font-size:0.62rem;color:var(--muted2);margin-top:18px;text-align:center}
.perf-bar-track{height:4px;background:var(--border2);border-radius:2px;margin-top:6px}
.perf-bar-fill{height:4px;border-radius:2px;background:var(--green);transition:width .5s,background .3s;width:0%}
.perf-bar-fill.warn{background:var(--amber)}
.perf-bar-fill.danger{background:var(--red)}
</style>
</head>
<body>
<div class="card">
  <div class="brand">Miyoubi Panel &mdash; Server Status</div>
  <div class="srv-name" id="srv-name">Loading...</div>
  <div class="srv-type">Docker Minecraft Server</div>

  <div class="status-row">
    <div class="dot" id="dot"></div>
    <div class="status-text" id="status-text">Checking...</div>
    <div class="uptime" id="uptime"></div>
  </div>
  <div class="divider"></div>

  <div class="stats-grid">
    <div class="stat-box">
      <div class="stat-label">Players</div>
      <div class="stat-val" id="stat-players">-</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Memory</div>
      <div class="stat-val" id="stat-mem">-</div>
      <div class="perf-bar-track"><div class="perf-bar-fill" id="bar-mem"></div></div>
    </div>
    <div class="stat-box">
      <div class="stat-label">CPU</div>
      <div class="stat-val" id="stat-cpu">-</div>
      <div class="perf-bar-track"><div class="perf-bar-fill" id="bar-cpu"></div></div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Status</div>
      <div class="stat-val" id="stat-status">-</div>
    </div>
  </div>

  <div class="player-box">
    <div class="player-label">Online Players</div>
    <div class="player-list" id="player-list">
      <span class="player-none">No players online</span>
    </div>
  </div>
</div>
<div class="footer">Auto-refreshes every 10 seconds &bull; Powered by Miyoubi Panel</div>

<script>
// Extract server ID from path: /s/{id}
var pathParts = window.location.pathname.split('/').filter(Boolean);
var serverId = pathParts[1] || '';
var serverName = '';

async function refresh() {
  if (!serverId) {
    document.getElementById('srv-name').textContent = 'Server not found';
    return;
  }
  try {
    // Status
    var sr = await fetch('/api/public/' + serverId + '/status');
    if (!sr.ok) { setOffline('Not found'); return; }
    var s = await sr.json();

    if (!serverName && s.name) {
      serverName = s.name;
      document.getElementById('srv-name').textContent = s.name;
      document.title = s.name + ' — Server Status';
    }

    var online = s.running;
    document.getElementById('dot').className = 'dot ' + (online ? 'online' : 'offline');
    document.getElementById('status-text').className = 'status-text ' + (online ? 'online' : 'offline');
    document.getElementById('status-text').textContent = online ? 'ONLINE' : 'OFFLINE';
    document.getElementById('uptime').textContent = s.uptime ? 'Up ' + s.uptime : '';
    document.getElementById('stat-status').textContent = (s.status || '-').toUpperCase();

    // Stats
    try {
      var ar = await fetch('/api/public/' + serverId + '/stats');
      if (ar.ok) {
        var a = await ar.json();
        var mu = a.mem_usage_mb || 0, ml = a.mem_limit_mb || 1;
        var mp = ml > 0 ? (mu / ml * 100) : 0;
        var cpu = a.cpu_percent || 0;
        document.getElementById('stat-mem').textContent = online ? mu.toFixed(0) + ' / ' + ml.toFixed(0) + ' MB' : '-';
        document.getElementById('stat-cpu').textContent = online ? cpu.toFixed(1) + '%' : '-';
        setBar('bar-mem', mp);
        setBar('bar-cpu', cpu);
      }
    } catch(e) {}

    // Players
    try {
      var pr = await fetch('/api/public/' + serverId + '/players');
      if (pr.ok) {
        var p = await pr.json();
        var count = p.count || 0, max = p.max || 20;
        document.getElementById('stat-players').textContent = count + ' / ' + max;
        var listEl = document.getElementById('player-list');
        listEl.innerHTML = '';
        if (p.online && p.online.length > 0) {
          p.online.forEach(function(name) {
            var chip = document.createElement('span');
            chip.className = 'player-chip';
            chip.textContent = name;
            listEl.appendChild(chip);
          });
        } else {
          listEl.innerHTML = '<span class="player-none">No players online</span>';
        }
      }
    } catch(e) {}

  } catch(e) {
    setOffline('Error');
  }
}

function setOffline(msg) {
  document.getElementById('dot').className = 'dot offline';
  document.getElementById('status-text').className = 'status-text offline';
  document.getElementById('status-text').textContent = msg || 'OFFLINE';
  document.getElementById('uptime').textContent = '';
  document.getElementById('stat-players').textContent = '-';
  document.getElementById('stat-mem').textContent = '-';
  document.getElementById('stat-cpu').textContent = '-';
  document.getElementById('stat-status').textContent = '-';
  setBar('bar-mem', 0); setBar('bar-cpu', 0);
}

function setBar(id, pct) {
  var el = document.getElementById(id);
  el.style.width = Math.min(100, pct).toFixed(1) + '%';
  el.className = 'perf-bar-fill' + (pct > 85 ? ' danger' : pct > 65 ? ' warn' : '');
}

refresh();
setInterval(refresh, 10000);
</script>
</body>
</html>
